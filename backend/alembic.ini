# Alembic 配置文件

[alembic]
# 脚本位置
script_location = alembic

# 版本文件模板
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区
timezone = UTC

# 截断长标识符
truncate_slug_length = 40

# 版本目录
version_path_separator = os

# 输出编码
output_encoding = utf-8

# 数据库连接 URL（从环境变量读取）
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# 钩子配置

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S